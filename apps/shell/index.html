<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MFE Shell</title>

  <!-- Import Map — resolve módulos dos microfrontends -->
  <script type="importmap">
    {
      "imports": {
        "@mfe/tokens": "/libs/tokens/src/index.ts",
        "@mfe/utils": "/libs/utils/src/index.ts"
      }
    }
  </script>

  <!-- Design Tokens globais via CSS Custom Properties -->
  <style>
    :root {
      --color-primary: #1a73e8;
      --color-secondary: #5f6368;
      --color-background: #ffffff;
      --color-surface: #f8f9fa;
      --color-error: #d93025;
      --color-success: #1e8e3e;

      --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-size-sm: 0.875rem;
      --font-size-md: 1rem;
      --font-size-lg: 1.25rem;
      --font-size-xl: 1.5rem;

      --spacing-xs: 0.25rem;
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --spacing-xl: 2rem;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.1);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background: var(--color-background);
      color: var(--color-secondary);
    }
  </style>
</head>
<body>
  <!-- Microfrontends são carregados como Web Components -->
  <!-- Exemplo: <mfe-header></mfe-header> -->
  <!-- Exemplo: <mfe-dashboard></mfe-dashboard> -->

  <main id="app">
    <h1 style="padding: var(--spacing-xl); color: var(--color-primary);">
      MFE Shell - Ready
    </h1>
    <p style="padding: 0 var(--spacing-xl); color: var(--color-secondary);">
      Microfrontends will be loaded here as Web Components.
    </p>
  </main>
</body>
</html>
